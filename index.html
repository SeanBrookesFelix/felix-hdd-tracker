<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Felix Studios — HDD Asset Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0b;
  --surface:#161614;
  --surface2:#1e1e1b;
  --surface3:#252520;
  --border:#2c2c28;
  --border-h:#3c3c36;
  --text1:#ece9e0;
  --text2:#8a8780;
  --text3:#4e4c48;
  --accent:#c8a86a;
  --accent-bg:#2a2010;
  --green:#4a8c5a;
  --green-bg:#0e1f12;
  --green-text:#6db87e;
  --amber:#c07830;
  --amber-bg:#221608;
  --amber-text:#d49050;
  --red:#a83030;
  --red-bg:#1e0c0c;
  --red-text:#c85050;
  --blue:#3d78c0;
  --blue-bg:#0c1a2e;
  --blue-text:#6898d8;
  --purple:#7060c0;
  --purple-bg:#140e2a;
  --purple-text:#9880d8;
  --r:8px;
  --r-lg:12px;
}
html{font-size:15px;-webkit-font-smoothing:antialiased}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text1);min-height:100vh;line-height:1.5}

/* ── Header ── */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:12px}
.logo-mark{font-size:13px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--text1)}
.logo-divider{width:1px;height:16px;background:var(--border)}
.logo-sub{font-size:12px;color:var(--text3);letter-spacing:0.04em}
.header-stats{display:flex;gap:8px}
.hstat{font-size:12px;color:var(--text2);padding:4px 10px;background:var(--surface2);border-radius:20px;border:1px solid var(--border)}
.hstat b{color:var(--text1);font-weight:500}

/* ── Main layout ── */
.main{max-width:800px;margin:0 auto;padding:32px 20px 80px}

/* ── Search ── */
.search-wrap{position:relative;margin-bottom:14px}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:18px;pointer-events:none}
.search-input{width:100%;height:52px;padding:0 52px 0 48px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);color:var(--text1);font-family:inherit;font-size:15px;outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--border-h)}
.search-input::placeholder{color:var(--text3)}
.search-clear{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:var(--surface3);border:none;color:var(--text2);cursor:pointer;width:24px;height:24px;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:14px}
.search-clear.visible{display:flex}
.search-clear:hover{background:var(--border);color:var(--text1)}

/* ── Filters ── */
.filter-group{margin-bottom:10px}
.filter-label{font-size:11px;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:0}
.filters-wrap{margin-bottom:24px;display:flex;flex-direction:column;gap:8px}
.pill{padding:5px 13px;border-radius:20px;font-size:12px;font-family:inherit;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .12s;white-space:nowrap}
.pill:hover{border-color:var(--border-h);color:var(--text1)}
.pill.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.pill-type.active{background:var(--blue-bg);border-color:var(--blue);color:var(--blue-text)}
.pill-video.active{background:var(--blue-bg);border-color:var(--blue);color:var(--blue-text)}
.pill-image.active{background:var(--green-bg);border-color:var(--green);color:var(--green-text)}

/* ── Results header ── */
.results-meta{font-size:12px;color:var(--text3);margin-bottom:10px;height:16px}

/* ── Result cards ── */
.results{display:flex;flex-direction:column;gap:6px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;transition:border-color .12s;cursor:default}
.card:hover{border-color:var(--border-h)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.folder-name{font-size:14px;font-weight:500;line-height:1.4;flex:1;color:var(--text1)}
.folder-name mark{background:transparent;color:var(--accent);font-weight:500}
.badges{display:flex;gap:5px;flex-shrink:0;margin-top:2px}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:400;white-space:nowrap}
.b-video{background:var(--blue-bg);color:var(--blue-text)}
.b-image{background:var(--green-bg);color:var(--green-text)}
.b-project{background:var(--amber-bg);color:var(--amber-text)}
.b-audio{background:var(--purple-bg);color:var(--purple-text)}
.b-dump{background:var(--surface3);color:var(--text2)}
.b-faulty{background:var(--red-bg);color:var(--red-text)}
.card-meta{display:flex;align-items:center;flex-wrap:wrap;gap:10px;font-size:12px;color:var(--text2);margin-bottom:8px}
.meta-item{display:flex;align-items:center;gap:4px}
.meta-item svg{flex-shrink:0;opacity:.5}
.drive-chip{font-family:'DM Mono',monospace;font-size:11px;background:var(--surface2);border:1px solid var(--border);padding:1px 8px;border-radius:4px;color:var(--text2)}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-active{background:var(--green)}
.dot-faulty{background:var(--red)}
.dot-transit{background:var(--amber)}
.dot-other{background:var(--text3)}
.card-divider{border:none;border-top:1px solid var(--border);margin:8px 0}
.backup-row{display:flex;align-items:center;gap:6px;font-size:12px}
.backup-ok{color:var(--green-text)}
.backup-missing{color:var(--amber-text)}
.backup-drives{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2)}

/* ── Empty / loading states ── */
.state{text-align:center;padding:60px 20px;color:var(--text3)}
.state-icon{font-size:36px;margin-bottom:12px;display:block;opacity:.4}
.state-title{font-size:15px;color:var(--text2);margin-bottom:6px}
.state-sub{font-size:13px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Landing (no query) ── */
.landing{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-top:8px}
.client-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;cursor:pointer;transition:all .12s}
.client-card:hover{border-color:var(--accent);background:var(--surface2)}
.client-card:hover .cc-name{color:var(--accent)}
.cc-name{font-size:13px;font-weight:500;margin-bottom:4px;color:var(--text1);transition:color .12s}
.cc-count{font-size:12px;color:var(--text3)}
.landing-label{font-size:11px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px}

/* ── Recent drives ── */
.recent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;margin-top:8px}
.recent-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.rc-name{font-family:'DM Mono',monospace;font-size:12px;color:var(--text1);margin-bottom:4px;font-weight:500}
.rc-meta{font-size:11px;color:var(--text3);display:flex;gap:8px}
.rc-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:3px;vertical-align:2px}

/* ── Section heading ── */
.section-head{font-size:11px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}

/* ── Drive notes tooltip ── */
.drive-notes{font-size:12px;color:var(--amber-text);background:var(--amber-bg);border:1px solid var(--amber);border-radius:var(--r);padding:6px 10px;margin-top:6px}

/* ── Drive groups ── */
.drive-group{margin-bottom:20px}
.drive-group-header{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--surface2);border:1px solid var(--border-h);border-radius:var(--r-lg) var(--r-lg) 0 0;flex-wrap:wrap}
.dg-name{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--text1)}
.dg-divider{width:1px;height:12px;background:var(--border-h);flex-shrink:0}
.dg-meta{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.dg-count{margin-left:auto;font-size:11px;color:var(--text3);white-space:nowrap}
.dg-free{font-size:11px;color:var(--text3)}
.drive-group-folders{border:1px solid var(--border-h);border-top:none;border-radius:0 0 var(--r-lg) var(--r-lg);overflow:hidden}
.folder-row{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);transition:background .1s;cursor:default}
.folder-row:last-child{border-bottom:none}
.folder-row:hover{background:var(--surface2)}
.fr-name{font-size:13px;font-weight:500;color:var(--text1);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fr-name mark{background:transparent;color:var(--accent);font-weight:500}
.fr-date{font-size:11px;color:var(--text3);white-space:nowrap;flex-shrink:0}
.fr-badges{display:flex;gap:4px;flex-shrink:0}

/* ── Nav tabs ── */
.nav-links{display:flex;gap:4px;align-items:center}
.nav-link{font-size:12px;color:var(--text2);padding:5px 12px;border-radius:20px;border:1px solid transparent;cursor:pointer;background:none;font-family:inherit;transition:all .12s;white-space:nowrap}
.nav-link:hover{color:var(--text1);border-color:var(--border)}
.nav-link.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.nav-sep{width:1px;height:16px;background:var(--border);margin:0 4px}
.scan-btn{font-size:12px;padding:5px 13px;border-radius:20px;border:1px solid var(--green);background:var(--green-bg);color:var(--green-text);cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.scan-btn:hover:not(:disabled){background:var(--green);color:#fff}
.scan-btn:disabled{opacity:.6;cursor:default}
.scan-btn svg{flex-shrink:0}

/* ── Capacity dashboard ── */
.cap-section{display:none}
.cap-section.visible{display:block}
.search-section{display:block}
.search-section.hidden{display:none}
.cap-summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:28px}
.cap-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px}
.cap-stat-label{font-size:11px;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
.cap-stat-value{font-size:22px;font-weight:500;color:var(--text1);line-height:1}
.cap-stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
.cap-table-head{font-size:11px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
.cap-rows{display:flex;flex-direction:column;gap:6px;margin-bottom:28px}
.cap-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px 16px}
.cap-row-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cap-row-name{font-size:13px;font-weight:500;flex:1}
.cap-row-drives{font-size:11px;color:var(--text3)}
.cap-bar-track{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden}
.cap-bar-fill{height:100%;border-radius:3px;transition:width .4s ease}
.cap-bar-used{background:var(--accent)}
.cap-bar-warn{background:var(--amber)}
.cap-bar-crit{background:var(--red)}
.cap-row-meta{display:flex;gap:14px;margin-top:6px;font-size:11px;color:var(--text3)}
.cap-row-meta b{color:var(--text2);font-weight:500}

.folder-row-search{flex-direction:column;align-items:stretch;gap:3px;padding:10px 16px}
.fr-main{display:flex;align-items:center;gap:12px}
.fr-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.fr-sub{font-size:11px;display:flex;align-items:center;gap:8px}

.fr-note-inline{flex:1;min-width:0;background:transparent;border:none;border-bottom:1px solid transparent;color:var(--text3);font-family:'DM Sans',inherit;font-size:12px;outline:none;padding:2px 6px;transition:border-color .15s,color .15s}
.fr-note-inline:focus{border-bottom-color:var(--accent);color:var(--text2)}
.fr-note-inline:not(:placeholder-shown){color:var(--accent)}

/* ── Drive space list ── */
.cap-drive-list.hide-full .cap-drive-row.nearly-full{display:none}
.cap-drive-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border)}
.cap-drive-row:last-child{border-bottom:none}
.cap-dr-rank{font-size:11px;color:var(--text3);width:22px;text-align:right;flex-shrink:0}
.cap-dr-name{font-family:'DM Mono',monospace;font-size:12px;color:var(--text1);flex-shrink:0;min-width:130px}
.cap-dr-custodian{font-size:12px;color:var(--text2);flex-shrink:0;min-width:80px}
.cap-dr-bar{flex:1;min-width:60px}
.cap-dr-free{font-size:13px;font-weight:500;flex-shrink:0;min-width:90px;text-align:right}
.cap-dr-total{font-size:11px;color:var(--text3);flex-shrink:0;min-width:55px}
.cap-dr-flag{font-size:12px;flex-shrink:0;width:16px}
.cap-toggle-btn{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap}
.cap-toggle-btn:hover{border-color:var(--border-h);color:var(--text1)}
.cap-toggle-btn.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}

/* ── Pending drives ── */
.pending-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--red);color:#fff;font-size:10px;font-weight:500;border-radius:20px;min-width:16px;height:16px;padding:0 4px;margin-left:4px;vertical-align:1px}
.pending-cards{display:flex;flex-direction:column;gap:10px}
.pending-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px}
.pending-drive-name{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--text1)}
.pending-meta{display:flex;gap:14px;font-size:12px;color:var(--text2);margin:8px 0 14px;flex-wrap:wrap}
.pending-actions{display:flex;gap:8px}
.btn-approve{padding:7px 16px;border-radius:var(--r);font-size:13px;font-family:inherit;border:1px solid var(--green);background:var(--green-bg);color:var(--green-text);cursor:pointer;transition:all .12s;font-weight:500}
.btn-approve:hover:not(:disabled){background:var(--green);color:#fff}
.btn-ignore{padding:7px 16px;border-radius:var(--r);font-size:13px;font-family:inherit;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .12s}
.btn-ignore:hover:not(:disabled){border-color:var(--red);color:var(--red-text);background:var(--red-bg)}
.btn-approve:disabled,.btn-ignore:disabled{opacity:.5;cursor:default}

/* ── Responsive ── */
@media(max-width:600px){
  .header{padding:0 14px}
  .header-stats{display:none}
  .nav-links{display:none}
  .main{padding:20px 14px 60px}
  .card-top{flex-direction:column;gap:6px}
  .badges{margin-top:0}
  .drive-group-header{gap:6px}
  .dg-count{margin-left:0}
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <span class="logo-mark">Felix Studios</span>
    <div class="logo-divider"></div>
    <span class="logo-sub">HDD Asset Tracker</span>
  </div>
  <nav class="nav-links">
    <button class="nav-link active" id="tab-search">Search</button>
    <button class="nav-link" id="tab-capacity">Capacity</button>
    <button class="nav-link" id="tab-pending">Pending<span class="pending-badge" id="pending-badge" style="display:none"></span></button>
    <div class="nav-sep"></div>
    <button class="scan-btn" id="scan-now-btn" onclick="requestScan()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
      Scan Now
    </button>
  </nav>
  <div class="header-stats" id="header-stats">
    <span class="hstat"><b id="stat-drives">—</b> drives</span>
    <span class="hstat"><b id="stat-folders">—</b> folders</span>
  </div>
</header>

<main class="main">

  <!-- ── Search view ── -->
  <div class="search-section" id="search-section">
  <div class="search-wrap">
    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" id="search" type="text" placeholder="Search projects, shoots, clients..." autocomplete="off" spellcheck="false" />
    <button class="search-clear" id="search-clear" aria-label="Clear search">✕</button>
  </div>

  <div class="filters-wrap">
    <div class="filter-group">
      <div class="filter-label">Drive type</div>
      <div class="filters" id="type-filters">
        <button class="pill pill-type active" data-type="All">All drives</button>
        <button class="pill pill-type" data-type="SSD">SSDs only</button>
        <button class="pill pill-type" data-type="HDD">HDDs only</button>
      </div>
    </div>
    <div class="filter-group">
      <div class="filter-label">Content type</div>
      <div class="filters" id="content-filters">
        <button class="pill pill-content active" data-content="All">All types</button>
        <button class="pill pill-content pill-video" data-content="Video">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-1px" aria-hidden="true"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
          Video
        </button>
        <button class="pill pill-content pill-image" data-content="Image">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-1px" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Image
        </button>
      </div>
    </div>
    <div class="filter-group">
      <div class="filter-label">Client</div>
      <div class="filters" id="filters">
        <button class="pill active" data-client="All">All clients</button>
      </div>
    </div>
  </div>

  <div class="results-meta" id="results-meta"></div>
  <div id="results-container"></div>
  </div>

  <!-- ── Capacity view ── -->
  <div class="cap-section" id="cap-section">
    <div id="cap-container"><div class="spinner" style="margin-top:60px"></div></div>
  </div>

  <!-- ── Pending drives view ── -->
  <div class="cap-section" id="pending-section">
    <div id="pending-container"><div class="spinner" style="margin-top:60px"></div></div>
  </div>
</main>

<script>
const SUPA_URL = "https://htkkclrenswlvcbsisqe.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh0a2tjbHJlbnN3bHZjYnNpc3FlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNTM4MjAsImV4cCI6MjA5MzcyOTgyMH0.YAqzxw8f3QXvjkHME9U_HA5cJCYE7Dh7tDQ290A-H10";
const HEADERS  = { "apikey": SUPA_KEY, "Authorization": `Bearer ${SUPA_KEY}`, "Content-Type": "application/json" };

let activeClient = "All";
let activeDriveType = "All";
let activeContentType = "All";
let searchQuery  = "";
let debounceTimer;
let allClients   = [];
let allCustodians = [];
let driveTypeMap = {};
let allDriveNames = [];

// ── API helpers ──────────────────────────────────────────────

async function supaFetch(path, opts={}) {
  const r = await fetch(SUPA_URL + path, { headers: HEADERS, ...opts });
  return r.json();
}

async function rpc(fn, params) {
  const r = await fetch(`${SUPA_URL}/rest/v1/rpc/${fn}`, {
    method: "POST", headers: HEADERS,
    body: JSON.stringify(params)
  });
  return r.json();
}

// ── Startup ──────────────────────────────────────────────────

}

async function requestScan() {
  const btn = document.getElementById("scan-now-btn");
  btn.disabled = true;
  btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true" style="animation:spin .7s linear infinite"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg> Requesting...`;

  try {
    const resp = await fetch(`${SUPA_URL}/rest/v1/scan_requests`, {
      method: "POST",
      headers: {...HEADERS, "Prefer": "return=minimal"},
      body: JSON.stringify({ requested_by: "dashboard", status: "pending" })
    });

    if (resp.ok) {
      btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg> Scan requested`;

      setTimeout(() => {
        btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg> Scan Now`;
        btn.disabled = false;
        btn.style.borderColor = "";
      }, 5000);
    } else {
      throw new Error(resp.status);
    }
  } catch(e) {
    btn.innerHTML = `⚠ Failed — check connection`;
    setTimeout(() => {
      btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg> Scan Now`;
      btn.disabled = false;
    }, 3000);
  }
}

async function approveDrive(id, driveName) {
  const btnA = document.querySelector(`.btn-approve[data-id="${id}"]`);
  const btnI = document.querySelector(`.btn-ignore[data-id="${id}"]`);
  if (btnA) { btnA.disabled = true; btnA.textContent = "Approving..."; }
  if (btnI)   btnI.disabled = true;
  try {
    await fetch(`${SUPA_URL}/rest/v1/pending_drives?id=eq.${id}`, {
      method: "PATCH", headers: HEADERS,
      body: JSON.stringify({ status:"approved", decided_at: new Date().toISOString(), decided_by:"admin" })
    });
    if (btnA) btnA.textContent = "✓ Approved — scanner will register within 60s";
    setTimeout(() => { showPending(); loadPendingBadge(); }, 1500);
  } catch(e) {
    if (btnA) { btnA.disabled = false; btnA.textContent = "✓ Approve"; }
    if (btnI)   btnI.disabled = false;
  }
}

let capLoaded = false;

function toggleFullDrives() {
  const list = document.getElementById("cap-drive-list");
  const btn  = document.getElementById("cap-toggle-btn");
  if (!list || !btn) return;
  const hiding = list.classList.toggle("hide-full");
  btn.textContent = hiding ? "Show all drives" : "Hide nearly full (< 400 GB)";
  btn.classList.toggle("active", hiding);
}

async function showCapacity() {
  if (capLoaded) return; // only load once
  const container = document.getElementById("cap-container");

  try {
    const drives = await supaFetch(
      "/rest/v1/drives?select=drive_name,client,custodian,status,capacity_tb,free_tb,drive_type&order=client.asc"
    );

    // ── Global totals ──
    let totalCap = 0, totalFree = 0, totalUsed = 0;
    let activeCt = 0, faultyCt = 0, missingCt = 0;
    drives.forEach(d => {
      if (d.capacity_tb) totalCap  += d.capacity_tb;
      if (d.free_tb)     totalFree += d.free_tb;
      if (d.capacity_tb && d.free_tb) totalUsed += (d.capacity_tb - d.free_tb);
      if (d.status === "Active")  activeCt++;
      else if (d.status === "Faulty" || d.status === "Missing") faultyCt++;
      else missingCt++;
    });
    const pctUsed = totalCap > 0 ? (totalUsed / totalCap * 100).toFixed(0) : 0;

    // ── Group by client ──
    const byClient = {};
    drives.forEach(d => {
      const c = d.client || "Other";
      if (!byClient[c]) byClient[c] = { drives: [], cap: 0, free: 0, used: 0 };
      byClient[c].drives.push(d);
      if (d.capacity_tb) byClient[c].cap  += d.capacity_tb;
      if (d.free_tb)     byClient[c].free += d.free_tb;
      if (d.capacity_tb && d.free_tb) byClient[c].used += (d.capacity_tb - d.free_tb);
    });

    // ── Group by custodian ──
    const byCust = {};
    drives.forEach(d => {
      const c = d.custodian || "Unassigned";
      if (!byCust[c]) byCust[c] = { drives: 0, cap: 0, free: 0 };
      byCust[c].drives++;
      if (d.capacity_tb) byCust[c].cap  += d.capacity_tb;
      if (d.free_tb)     byCust[c].free += d.free_tb;
    });

    const fmt = tb => tb >= 1 ? `${tb.toFixed(1)} TB` : `${(tb * 1000).toFixed(0)} GB`;

    // ── Drives by available space ──────────────────────────────
    const THRESHOLD = 0.4; // 400 GB in TB
    const sortedByFree = [...drives]
      .filter(d => d.capacity_tb > 0)
      .sort((a, b) => (b.free_tb || 0) - (a.free_tb || 0));

    let driveListHtml = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <p class="cap-table-head" style="margin-bottom:0">Drives by available space</p>
      <button class="cap-toggle-btn" id="cap-toggle-btn" onclick="toggleFullDrives()">Hide nearly full (&lt; 400 GB)</button>
    </div>
    <div class="cap-row cap-drive-list" id="cap-drive-list" style="padding:4px 16px 8px">`;

    sortedByFree.forEach((d, i) => {
      const free   = d.free_tb    || 0;
      const cap    = d.capacity_tb || 1;
      const pct    = Math.min(((cap - free) / cap) * 100, 100);
      const isCrit = free < 0.1;
      const isWarn = free < THRESHOLD;
      const barCls = isCrit ? "cap-bar-crit" : isWarn ? "cap-bar-warn" : "cap-bar-used";
      const clr    = isCrit ? "var(--red-text)" : isWarn ? "var(--amber-text)" : "var(--green-text)";
      const flag   = isCrit ? "🔴" : isWarn ? "⚠" : "";
      driveListHtml += `<div class="cap-drive-row${isWarn ? " nearly-full" : ""}">
        <span class="cap-dr-rank">${i+1}</span>
        <span class="cap-dr-name">${esc(d.drive_name)}</span>
        <span class="cap-dr-custodian">${esc(d.custodian || "—")}</span>
        <div class="cap-dr-bar"><div class="cap-bar-track"><div class="cap-bar-fill ${barCls}" style="width:${pct.toFixed(1)}%"></div></div></div>
        <span class="cap-dr-free" style="color:${clr}">${fmt(free)} free</span>
        <span class="cap-dr-total">of ${fmt(cap)}</span>
        <span class="cap-dr-flag">${flag}</span>
      </div>`;
    });
    driveListHtml += `</div>`;

    // ── Render ──
    let html = driveListHtml + `
    <div class="cap-summary" style="margin-top:24px">
      <div class="cap-stat">
        <div class="cap-stat-label">Total storage</div>
        <div class="cap-stat-value">${fmt(totalCap)}</div>
        <div class="cap-stat-sub">${drives.length} drives</div>
      </div>
      <div class="cap-stat">
        <div class="cap-stat-label">Used</div>
        <div class="cap-stat-value">${fmt(totalUsed)}</div>
        <div class="cap-stat-sub">${pctUsed}% of total</div>
      </div>
      <div class="cap-stat">
        <div class="cap-stat-label">Free</div>
        <div class="cap-stat-value">${fmt(totalFree)}</div>
        <div class="cap-stat-sub">across all drives</div>
      </div>
      <div class="cap-stat">
        <div class="cap-stat-label">Drive health</div>
        <div class="cap-stat-value" style="color:var(--green-text)">${activeCt}</div>
        <div class="cap-stat-sub">${faultyCt > 0 ? `<span style="color:var(--red-text)">${faultyCt} faulty/missing</span>` : "all healthy"}</div>
      </div>
    </div>

    <p class="cap-table-head">Storage by client</p>
    <div class="cap-rows">`;

    Object.entries(byClient)
      .sort((a, b) => b[1].cap - a[1].cap)
      .forEach(([client, data]) => {
        const pct = data.cap > 0 ? (data.used / data.cap * 100) : 0;
        const barClass = pct > 90 ? "cap-bar-crit" : pct > 75 ? "cap-bar-warn" : "cap-bar-used";
        html += `<div class="cap-row">
          <div class="cap-row-top">
            <span class="cap-row-name">${esc(client)}</span>
            <span class="cap-row-drives">${data.drives.length} drive${data.drives.length!==1?"s":""}</span>
          </div>
          <div class="cap-bar-track">
            <div class="cap-bar-fill ${barClass}" style="width:${Math.min(pct,100).toFixed(1)}%"></div>
          </div>
          <div class="cap-row-meta">
            <span><b>${fmt(data.used)}</b> used</span>
            <span><b>${fmt(data.free)}</b> free</span>
            <span><b>${fmt(data.cap)}</b> total</span>
            <span>${pct.toFixed(0)}% full</span>
          </div>
        </div>`;
      });

    html += `</div>`;
    container.innerHTML = html;
    capLoaded = true;

  } catch(e) {
    container.innerHTML = errorState("Could not load capacity data.");
  }
}

function driveTypeMatch(drive_name) {
  if (activeDriveType === "All") return true;
  return (driveTypeMap[drive_name] || "Other") === activeDriveType;
}



async function showFolders() {
  const container = document.getElementById("results-container");
  const metaEl    = document.getElementById("results-meta");
  container.innerHTML = `<div class="spinner" style="margin-top:40px"></div>`;
  metaEl.textContent  = "";

  try {
    // Fetch folders
    let url = "/rest/v1/folders?select=id,folder_name,shoot_date,content_type,client,custodian,drive_status,drive_name,folder_size_gb,notes&order=shoot_date.desc.nullslast&limit=500";
    if (activeClient !== "All") url += `&client=eq.${encodeURIComponent(activeClient)}`;
    if (activeContentType !== "All") url += `&content_type=eq.${encodeURIComponent(activeContentType)}`;
    const data = await supaFetch(url);
    const filtered = data.filter(r => driveTypeMatch(r.drive_name));

    if (!filtered.length) {
      container.innerHTML = `<div class="state">
        <span class="state-icon">◎</span>
        <p class="state-title">No folders found</p>
        <p class="state-sub">Try a different client or drive type filter.</p>
      </div>`;
      return;
    }

    // Group folders by drive_name
    const grouped = {};
    filtered.forEach(f => {
      if (!grouped[f.drive_name]) grouped[f.drive_name] = [];
      grouped[f.drive_name].push(f);
    });

    // Fetch drive metadata (capacity, free, last_scanned) in one call
    const driveNames = Object.keys(grouped);
    const encoded    = driveNames.map(n => encodeURIComponent(`"${n}"`)).join(",");
    let driveMeta    = {};
    try {
      const metaData = await supaFetch(
        `/rest/v1/drives?drive_name=in.(${driveNames.map(n => `"${n}"`).join(",")})&select=drive_name,capacity_tb,free_tb,last_scanned,felix_id`
      );
      metaData.forEach(d => { driveMeta[d.drive_name] = d; });
    } catch(e) {}

    // Sort drives: most recent folder shoot date first
    const sortedDrives = Object.entries(grouped).sort((a, b) => {
      const latestA = Math.max(...a[1].map(f => f.shoot_date ? new Date(f.shoot_date).getTime() : 0));
      const latestB = Math.max(...b[1].map(f => f.shoot_date ? new Date(f.shoot_date).getTime() : 0));
      return latestB - latestA;
    });

    const clientLabel  = activeClient === "All" ? "all clients" : activeClient;
    const typeLabel    = activeDriveType === "All" ? "" : ` · ${activeDriveType}s only`;
    const contentLabel = activeContentType === "All" ? "" : ` · ${activeContentType} only`;
    metaEl.textContent = `${driveNames.length} drives · ${filtered.length} folders · ${clientLabel}${typeLabel}${contentLabel}`;
    container.innerHTML = sortedDrives.map(([driveName, folders]) =>
      driveGroup(driveName, folders, driveMeta[driveName] || {})
    ).join("");

  } catch(e) {
    container.innerHTML = errorState("Could not load folders.");
  }
}

function driveGroup(driveName, folders, meta, query = null, rowFn = null) {
  // Use drive metadata for drive-level fields — folders array may be empty
  const custodian = meta.custodian || (folders[0] && folders[0].custodian) || "";
  const status    = meta.status    || (folders[0] && folders[0].drive_status) || "Active";
  const dotClass  = status === "Faulty" ? "dot-faulty" : status === "In Transit" ? "dot-transit" : status === "Missing" ? "dot-faulty" : "dot-active";

  const capacityStr = meta.capacity_tb ? `${meta.capacity_tb} TB` : "";
  const freeStr     = meta.free_tb != null ? `${(meta.free_tb * 1000).toFixed(0)} GB free` : "";
  const scannedStr  = meta.last_scanned ? `scanned ${timeAgo(meta.last_scanned)}` : "";

  const header = `<div class="drive-group-header">
    <span class="dg-name">${esc(driveName)}</span>
    <div class="dg-divider"></div>
    <div class="dg-meta">
      <span class="meta-item">
        <span class="status-dot ${dotClass}"></span>${esc(status)}
      </span>
      ${custodian ? `<span class="meta-item">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        ${esc(custodian)}</span>` : ""}
      ${capacityStr ? `<span class="dg-free">${capacityStr}${freeStr ? ` · ${freeStr}` : ""}</span>` : ""}
      ${scannedStr  ? `<span class="dg-free">${scannedStr}</span>` : ""}
    </div>
    <span class="dg-count">${folders.length} folder${folders.length !== 1 ? "s" : ""}</span>
  </div>`;

  const rows = folders.map(f => rowFn ? rowFn(f, query) : folderRow(f, query)).join("");

  return `<div class="drive-group">${header}<div class="drive-group-folders">${rows}</div></div>`;
}

function folderRow(r, query) {
  const badgeClass = {
    "Video":         "b-video",
    "Image":         "b-image",
    "Project Files": "b-project",
    "Audio":         "b-audio",
    "Data Dump":     "b-dump",
  }[r.content_type] || "b-dump";

  const fmtDate = r.shoot_date ? formatDate(r.shoot_date) : "";
  const size    = fmtSize(r.folder_size_gb);
  const name    = query ? highlight(esc(r.folder_name), query) : esc(r.folder_name);

  return `<div class="folder-row">
    <span class="fr-name">${name}</span>
    ${r.id ? noteField(r.id, r.notes) : `<span style="flex:1"></span>`}
    ${size ? `<span class="fr-date" style="color:var(--text3)">${size}</span>` : ""}
    ${fmtDate ? `<span class="fr-date">${fmtDate}</span>` : ""}
    <div class="fr-badges">
      <span class="badge ${badgeClass}">${esc(r.content_type || "")}</span>
    </div>
  </div>`;
}

// ── Search ────────────────────────────────────────────────────

function findMatchingDrives(query) {
  const q = query.toLowerCase().trim();
  if (q.length < 2) return [];
  return allDriveNames.filter(name => name.toLowerCase().includes(q));
}

function findMatchingCustodians(query) {
  const q = query.toLowerCase().trim();
  if (q.length < 2) return [];
  return allCustodians.filter(name => name.toLowerCase().includes(q));
}

async function search(query) {
  // 1. Drive name match → drive-grouped view
  const matchedDrives = findMatchingDrives(query);
  if (matchedDrives.length > 0) {
    await showDriveSearch(matchedDrives, query);
    return;
  }
  // 2. Custodian name match → show all drives held by that person
  const matchedCustodians = findMatchingCustodians(query);
  if (matchedCustodians.length > 0) {
    await showCustodianSearch(matchedCustodians, query);
    return;
  }
  // 3. Fuzzy folder/client search
  await fuzzySearch(query);
}

async function showCustodianSearch(custodianNames, query) {
  const container = document.getElementById("results-container");
  const metaEl    = document.getElementById("results-meta");
  container.innerHTML = `<div class="spinner" style="margin-top:40px"></div>`;
  metaEl.textContent  = "";

  try {
    const inList = custodianNames.map(n => `"${n}"`).join(",");

    // Fetch all drives held by these custodians + their folders in parallel
    const [drives, folderData] = await Promise.all([
      supaFetch(`/rest/v1/drives?custodian=in.(${inList})&select=drive_name,client,custodian,status,capacity_tb,free_tb,last_scanned&order=last_scanned.desc.nullslast`),
      supaFetch(`/rest/v1/folders?custodian=in.(${inList})&select=id,folder_name,shoot_date,content_type,client,custodian,drive_status,drive_name,folder_size_gb,notes&order=shoot_date.desc.nullslast&limit=500`)
    ]);

    // Apply drive type filter
    const filteredDrives = drives.filter(d => driveTypeMatch(d.drive_name));

    if (!filteredDrives.length) {
      container.innerHTML = emptyState(query);
      return;
    }

    // Build drive metadata map
    const driveMeta = {};
    filteredDrives.forEach(d => { driveMeta[d.drive_name] = d; });

    // Group folders by drive
    const grouped = {};
    filteredDrives.forEach(d => { grouped[d.drive_name] = []; });
    folderData.forEach(f => {
      if (grouped[f.drive_name]) grouped[f.drive_name].push(f);
    });

    const custodianLabel = custodianNames.length === 1
      ? custodianNames[0]
      : custodianNames.join(", ");
    const totalFolders = folderData.length;
    metaEl.textContent = `${filteredDrives.length} drive${filteredDrives.length!==1?"s":""} · ${totalFolders} folders · with ${custodianLabel}`;

    container.innerHTML = Object.entries(grouped).map(([driveName, folders]) =>
      driveGroup(driveName, folders, driveMeta[driveName] || {}, null)
    ).join("");

  } catch(e) {
    container.innerHTML = errorState("Custodian search failed.");
  }
}

async function showDriveSearch(driveNames, query) {
  const container = document.getElementById("results-container");
  const metaEl    = document.getElementById("results-meta");
  container.innerHTML = `<div class="spinner" style="margin-top:40px"></div>`;
  metaEl.textContent  = "";

  try {
    const inList = driveNames.map(n => `"${n}"`).join(",");

    // Fetch folders AND drive metadata in parallel
    const [folderData, metaData] = await Promise.all([
      supaFetch(`/rest/v1/folders?drive_name=in.(${inList})&select=id,folder_name,shoot_date,content_type,client,custodian,drive_status,drive_name,folder_size_gb,notes&order=drive_name.asc,shoot_date.desc.nullslast&limit=500`),
      supaFetch(`/rest/v1/drives?drive_name=in.(${inList})&select=drive_name,capacity_tb,free_tb,last_scanned,custodian,status`)
    ]);

    // Build drive metadata map
    const driveMeta = {};
    metaData.forEach(d => { driveMeta[d.drive_name] = d; });

    // If drive exists in DB but has no folders — show drive card with notice
    if (!folderData.length) {
      if (metaData.length) {
        const driveLabel = driveNames.length === 1 ? driveNames[0] : `${driveNames.length} drives matching "${query}"`;
        metaEl.textContent = `${metaData.length} drive${metaData.length !== 1 ? "s" : ""} found · no folders synced yet`;
        container.innerHTML = metaData.map(d => {
          const dotClass = d.status === "Faulty" ? "dot-faulty" : d.status === "In Transit" ? "dot-transit" : "dot-active";
          const freeStr  = d.free_tb != null ? `${(d.free_tb * 1000).toFixed(0)} GB free` : "";
          const capStr   = d.capacity_tb ? `${d.capacity_tb} TB` : "";
          const scanned  = d.last_scanned ? `scanned ${timeAgo(d.last_scanned)}` : "never scanned";
          return `<div class="drive-group">
            <div class="drive-group-header">
              <span class="dg-name">${esc(d.drive_name)}</span>
              <div class="dg-divider"></div>
              <div class="dg-meta">
                <span class="meta-item"><span class="status-dot ${dotClass}"></span>${esc(d.status || "Active")}</span>
                ${d.custodian ? `<span class="meta-item"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>${esc(d.custodian)}</span>` : ""}
                ${capStr ? `<span class="dg-free">${capStr}${freeStr ? ` · ${freeStr}` : ""}</span>` : ""}
                <span class="dg-free">${scanned}</span>
              </div>
              <span class="dg-count">0 folders</span>
            </div>
            <div class="drive-group-folders">
              <div class="folder-row" style="color:var(--text3);font-size:13px;justify-content:center;padding:16px">
                No folders found — drive may be empty or needs Full Disk Access permission in System Settings
              </div>
            </div>
          </div>`;
        }).join("");
      } else {
        container.innerHTML = emptyState(query);
      }
      return;
    }

    // Group folders by drive
    const grouped = {};
    folderData.forEach(f => {
      if (!grouped[f.drive_name]) grouped[f.drive_name] = [];
      grouped[f.drive_name].push(f);
    });

    const driveLabel = driveNames.length === 1
      ? driveNames[0]
      : `${driveNames.length} drives matching "${query}"`;
    metaEl.textContent = `${folderData.length} folders on ${driveLabel}`;

    container.innerHTML = Object.entries(grouped).map(([driveName, folders]) =>
      driveGroup(driveName, folders, driveMeta[driveName] || {}, query)
    ).join("");

  } catch(e) {
    container.innerHTML = errorState("Drive search failed.");
  }
}

function searchFolderBlock(r, query) {
  const badgeClass = {
    "Video": "b-video", "Image": "b-image",
    "Project Files": "b-project", "Audio": "b-audio", "Data Dump": "b-dump"
  }[r.content_type] || "b-dump";

  const size    = fmtSize(r.folder_size_gb);
  const fmtDate = r.shoot_date ? formatDate(r.shoot_date) : "";
  const name    = query ? highlight(esc(r.folder_name), query) : esc(r.folder_name);
  const bc      = parseInt(r.backup_count) || 0;

  const backupHtml = bc > 0
    ? `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
       <span class="backup-ok">${bc} backup${bc!==1?"s":""}</span>
       <span class="backup-drives">${esc(r.backup_drives||"")}</span>
       ${r.backup_custodians ? `<span style="color:var(--text3)">with ${esc(r.backup_custodians)}</span>` : ""}`
    : `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
       <span class="backup-missing">No backup</span>`;

  const notesHtml = r.drive_notes
    ? `<span style="color:var(--amber-text)">⚠ ${esc(r.drive_notes.split("\n")[0].substring(0,80))}</span>`
    : "";

  return `<div class="folder-row folder-row-search">
    <div class="fr-main">
      <span class="fr-name">${name}</span>
      ${r.id ? noteField(r.id, r.notes) : `<span style="flex:1"></span>`}
      <div class="fr-right">
        ${size ? `<span class="fr-date" style="color:var(--text3)">${size}</span>` : ""}
        ${fmtDate ? `<span class="fr-date">${fmtDate}</span>` : ""}
        <span class="badge ${badgeClass}">${esc(r.content_type || "")}</span>
      </div>
    </div>
    <div class="fr-sub">
      ${notesHtml}
      ${backupHtml}
    </div>
  </div>`;
}

async function fuzzySearch(query) {
  const container = document.getElementById("results-container");
  const metaEl    = document.getElementById("results-meta");
  container.innerHTML = `<div class="spinner" style="margin-top:40px"></div>`;
  metaEl.textContent  = "";

  try {
    let results = await rpc("search_folders", { query });

    if (!Array.isArray(results)) {
      container.innerHTML = errorState("Search function error — check Supabase schema.");
      return;
    }

    // Apply filters
    if (activeClient !== "All")      results = results.filter(r => r.client === activeClient);
    if (activeDriveType !== "All")   results = results.filter(r => driveTypeMatch(r.drive_name));
    if (activeContentType !== "All") results = results.filter(r => r.content_type === activeContentType);

    if (!results.length) {
      container.innerHTML = emptyState(query);
      return;
    }

    // Group by drive — preserve relevance order (first match per drive = drive rank)
    const grouped   = {};
    const driveOrder = [];
    results.forEach(r => {
      if (!grouped[r.drive_name]) {
        grouped[r.drive_name] = {
          folders: [],
          meta: {
            custodian:    r.custodian,
            status:       r.drive_status,
            capacity_tb:  r.capacity_tb,
            free_tb:      r.free_tb,
            last_scanned: r.last_scanned,
          }
        };
        driveOrder.push(r.drive_name);
      }
      grouped[r.drive_name].folders.push(r);
    });

    const driveCount = driveOrder.length;
    driveOrder.sort((a, b) => a.localeCompare(b));
    metaEl.textContent = `${results.length} result${results.length!==1?"s":""} across ${driveCount} drive${driveCount!==1?"s":""} for "${query}"`;

    container.innerHTML = driveOrder.sort((a, b) => a.localeCompare(b)).map(driveName => {
      const { folders, meta } = grouped[driveName];
      return driveGroup(driveName, folders, meta, query, searchFolderBlock);
    }).join("");

  } catch(e) {
    container.innerHTML = errorState("Search failed — check your connection.");
  }
}

// ── Card renderer ─────────────────────────────────────────────

function resultCard(r, query) {
  const badgeClass = {
    "Video":         "b-video",
    "Image":         "b-image",
    "Project Files": "b-project",
    "Audio":         "b-purple",
    "Data Dump":     "b-dump",
  }[r.content_type] || "b-dump";

  const dotClass = r.drive_status === "Faulty"      ? "dot-faulty"  :
                   r.drive_status === "In Transit"   ? "dot-transit" :
                   r.drive_status === "Missing"      ? "dot-faulty"  : "dot-active";

  const fmtDate    = r.shoot_date ? formatDate(r.shoot_date) : "";
  const fmtName    = highlight(esc(r.folder_name), query);
  const size       = fmtSize(r.folder_size_gb);

  // Backup status
  const bc = parseInt(r.backup_count) || 0;
  let backupHtml = "";
  if (bc > 0) {
    const drives    = r.backup_drives    || "";
    const custodians = r.backup_custodians || "";
    backupHtml = `<hr class="card-divider">
      <div class="backup-row">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
        <span class="backup-ok">${bc} backup${bc!==1?"s":""} found</span>
        <span class="backup-drives">${esc(drives)}</span>
        ${custodians ? `<span style="color:var(--text3)">with ${esc(custodians)}</span>` : ""}
      </div>`;
  } else {
    backupHtml = `<hr class="card-divider">
      <div class="backup-row">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span class="backup-missing">No backup detected</span>
      </div>`;
  }

  // Drive notes (if any)
  let notesHtml = "";
  if (r.drive_notes) {
    const firstLine = r.drive_notes.split("\n")[0].substring(0, 120);
    notesHtml = `<div class="drive-notes">⚠ ${esc(firstLine)}</div>`;
  }

  const freeDisplay = r.free_tb ? `${(r.free_tb * 1000).toFixed(0)} GB free` : "";

  return `<div class="card">
    <div class="card-top">
      <div class="folder-name">${fmtName}</div>
      <div class="badges">
        <span class="badge ${badgeClass}">${esc(r.content_type || "")}</span>
        ${r.drive_status !== "Active" ? `<span class="badge b-faulty">${esc(r.drive_status)}</span>` : ""}
      </div>
    </div>
    <div class="card-meta">
      ${fmtDate ? `<span class="meta-item">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        ${fmtDate}</span>` : ""}
      ${size ? `<span class="meta-item" style="color:var(--text3)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/></svg>
        ${size}</span>` : ""}
      <span class="meta-item">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        ${esc(r.client || "")}</span>
      <span class="drive-chip">${esc(r.drive_name || "")}</span>
      <span class="meta-item">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        ${esc(r.custodian || "")}</span>
      <span class="meta-item">
        <span class="status-dot ${dotClass}"></span>
        ${esc(r.drive_status || "")}</span>
      ${freeDisplay ? `<span class="meta-item" style="color:var(--text3)">${freeDisplay}</span>` : ""}
    </div>
    ${notesHtml}
    ${backupHtml}
  </div>`;
}

// ── States ────────────────────────────────────────────────────

function emptyState(query) {
  return `<div class="state">
    <span class="state-icon">◎</span>
    <p class="state-title">No results for "${esc(query)}"</p>
    <p class="state-sub">Try different keywords or check the client filter above.</p>
  </div>`;
}

function errorState(msg) {
  return `<div class="state">
    <span class="state-icon">⚠</span>
    <p class="state-title">${esc(msg)}</p>
  </div>`;
}

// ── Utilities ─────────────────────────────────────────────────

function fmtSize(gb) {
  if (!gb || gb < 0.001) return "";
  if (gb < 1)    return `${(gb * 1024).toFixed(0)} MB`;
  if (gb >= 1000) return `${(gb / 1024).toFixed(2)} TB`;
  return `${gb.toFixed(1)} GB`;
}

function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function highlight(escapedText, query) {
  if (!query) return escapedText;
  const safe = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escapedText.replace(new RegExp(`(${safe})`, 'gi'), '<mark>$1</mark>');
}

function formatDate(d) {
  if (!d) return "";
  const [y,m,day] = d.split("-");
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return `${parseInt(day)} ${months[parseInt(m)-1]} ${y}`;
}

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const mins  = Math.floor(diff / 60000);
  const hours = Math.floor(mins / 60);
  const days  = Math.floor(hours / 24);
  if (mins < 2)   return "just now";
  if (mins < 60)  return `${mins}m ago`;
  if (hours < 24) return `${hours}h ago`;
  if (days < 7)   return `${days}d ago`;
  return formatDate(iso.split("T")[0]);
}

// ── Event wiring ──────────────────────────────────────────────

const searchEl = document.getElementById("search");
const clearBtn = document.getElementById("search-clear");

searchEl.addEventListener("input", e => {
  searchQuery = e.target.value.trim();
  clearBtn.classList.toggle("visible", searchQuery.length > 0);
  clearTimeout(debounceTimer);
  if (!searchQuery) {
    document.getElementById("results-meta").textContent = "";
    showFolders();
    return;
  }
  if (searchQuery.length < 2) return;
  debounceTimer = setTimeout(() => search(searchQuery), 300);
});

clearBtn.addEventListener("click", () => {
  searchEl.value = "";
  searchQuery    = "";
  clearBtn.classList.remove("visible");
  document.getElementById("results-meta").textContent = "";
  showFolders();
  searchEl.focus();
});

// ── Boot ──────────────────────────────────────────────────────
init();
</script>
